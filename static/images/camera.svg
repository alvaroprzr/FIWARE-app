<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Cámara web">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#042f2e"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <radialGradient id="lensGlow" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#67e8f9" stop-opacity="0.8"/>
      <stop offset="55%" stop-color="#0ea5e9" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="26" flood-color="#000000" flood-opacity="0.48"/>
    </filter>
  </defs>
  <rect width="1200" height="800" rx="48" fill="url(#bg)"/>
  <circle cx="250" cy="170" r="180" fill="#67e8f9" opacity="0.12"/>
  <circle cx="980" cy="620" r="230" fill="#22c55e" opacity="0.08"/>
  <g filter="url(#shadow)">
    <circle cx="600" cy="300" r="166" fill="#0f172a" stroke="#99f6e4" stroke-width="10"/>
    <circle cx="600" cy="300" r="118" fill="#111827" stroke="#cffafe" stroke-width="10"/>
    <circle cx="600" cy="300" r="80" fill="#0f172a"/>
    <circle cx="600" cy="300" r="52" fill="#38bdf8"/>
    <circle cx="600" cy="300" r="24" fill="#e0f2fe"/>
    <circle cx="600" cy="300" r="14" fill="#0f172a"/>
    <circle cx="600" cy="300" r="150" fill="url(#lensGlow)"/>
    <rect x="470" y="428" width="260" height="54" rx="24" fill="#cffafe"/>
    <rect x="500" y="482" width="200" height="66" rx="18" fill="#e0f2fe"/>
    <rect x="450" y="548" width="300" height="24" rx="12" fill="#67e8f9" opacity="0.7"/>
  </g>
  <text x="600" y="660" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="58" font-weight="700" text-anchor="middle">Cámara Web</text>
  <text x="600" y="706" fill="#a5f3fc" font-family="Arial, Helvetica, sans-serif" font-size="24" text-anchor="middle">Logitech 4K PRO</text>
