{% extends "base.html" %}

{% block title %}Mapa Global - FIWARE Almacén{% endblock %}

{% block content %}
<div class="container">
    <h1 data-i18n="map.title">Mapa de Stores</h1>
    <div id="global-map" class="global-map-container"></div>
</div>

<script src="{{ url_for('static', filename='maps.js') }}"></script>
<script>
    const stores = {{ stores | tojson }};
    initializeGlobalMap(stores);
</script>
{% endblock %}

{% block extra_css %}
<style>
.global-map-container {
    width: 100%;
    height: 600px;
    border-radius: 12px;
    margin-top: 80px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    z-index: 50;
}

.store-image-marker-wrapper {
    background: transparent;
    border: none;
}

.store-image-marker {
    width: 54px;
    height: 54px;
    border-radius: 50%;
    border: 3px solid #ffffff;
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.35);
    overflow: hidden;
    background: #f2f2f2;
}

.store-image-marker img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
}

.store-hover-tooltip {
    background: transparent;
    border: none;
    box-shadow: none;
}

.store-hover-tooltip .leaflet-tooltip-content {
    margin: 0;
}

.store-hover-card {
    width: 255px;
    background: #fff;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 10px 24px rgba(0, 0, 0, 0.25);
    border: 1px solid rgba(0, 0, 0, 0.08);
}

.store-hover-card-image {
    width: 100%;
    height: 140px;
    object-fit: cover;
    display: block;
}

.store-hover-card-body {
    padding: 0.75rem 0.9rem 0.9rem;
}

.store-hover-card-title {
    margin: 0 0 0.45rem;
    font-size: 1rem;
}

.store-hover-card-body p {
    margin: 0.24rem 0;
    font-size: 0.88rem;
}
</style>
{% endblock %}
