{% extends "base.html" %}

{% block title %}Añadir Producto - FIWARE Tienda{% endblock %}

{% block content %}
<div class="container">
    <div class="form-section">
        <h1 data-i18n="products.add">Añadir Nuevo Producto</h1>
        
        <form id="add-product-form" class="product-form">
            <div class="form-group">
                <label for="product-id" data-i18n="form.id">ID del Producto</label>
                <input type="text" id="product-id" name="id" required placeholder="ejemplo-producto-001"
                       pattern="[a-z0-9\-]+" title="Solo letras minúsculas, números y guiones">
                <small data-i18n="form.id_help">Solo caracteres alfanuméricos y guiones</small>
            </div>

            <div class="form-group">
                <label for="product-name" data-i18n="form.name">Nombre del Producto</label>
                <input type="text" id="product-name" name="name" required placeholder="Laptop Gaming ASUS">
            </div>

            <div class="form-group">
                <label for="product-price" data-i18n="form.price">Precio (€)</label>
                <input type="number" id="product-price" name="price" required min="0.01" step="0.01" placeholder="999.99">
            </div>

            <div class="form-group">
                <label for="product-size" data-i18n="form.size">Tamaño</label>
                <select id="product-size" name="size" required>
                    <option value="" data-i18n="form.select_size">-- Seleccionar tamaño --</option>
                    <option value="XS">XS (Extra Pequeño)</option>
                    <option value="S">S (Pequeño)</option>
                    <option value="M">M (Mediano)</option>
                    <option value="L">L (Grande)</option>
                    <option value="XL">XL (Extra Grande)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="product-color" data-i18n="form.color">Color</label>
                <input type="color" id="product-color" name="color" value="#000000">
                <p class="color-preview">
                    <span data-i18n="form.preview">Vista previa:</span>
                    <div class="swatch-preview" style="background-color: #000000;"></div>
                </p>
            </div>

            <div class="form-group">
                <label for="product-image" data-i18n="form.image">URL de Imagen</label>
                <input type="url" id="product-image" name="image" placeholder="https://via.placeholder.com/300x200">
                <image-preview id="image-preview-container"></image-preview>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary" data-i18n="form.create">Crear Producto</button>
                <a href="/products" class="btn btn-secondary" data-i18n="form.cancel">Cancelar</a>
            </div>

            <div id="form-message" class="form-message"></div>
        </form>
    </div>
</div>

<style>
.form-section {
    max-width: 600px;
    margin: 2rem auto;
    background: var(--surface);
    padding: 2rem;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.form-section h1 {
    margin-bottom: 1.5rem;
    color: var(--text);
}

.product-form {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
}

.form-group {
    display: flex;
    flex-direction: column;
}

.form-group label {
    margin-bottom: 0.5rem;
    font-weight: 600;
    color: var(--text);
}

.form-group input[type="text"],
.form-group input[type="number"],
.form-group input[type="url"],
.form-group input[type="color"],
.form-group select {
    padding: 0.75rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    color: var(--text);
    font-size: 1rem;
    transition: border-color 0.2s ease;
}

.form-group input:focus,
.form-group select:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(31, 115, 219, 0.1);
}

.form-group small {
    margin-top: 0.25rem;
    color: var(--text-secondary);
    font-size: 0.85rem;
}

.color-preview {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-top: 0.5rem;
    font-size: 0.9rem;
    color: var(--text-secondary);
}

.swatch-preview {
    width: 40px;
    height: 40px;
    border-radius: 6px;
    border: 1px solid var(--border);
    transition: background-color 0.2s ease;
}

.form-actions {
    display: flex;
    gap: 1rem;
    margin-top: 1rem;
}

.btn {
    padding: 0.75rem 1.5rem;
    border: none;
    border-radius: 6px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    text-align: center;
    transition: all 0.2s ease;
    flex: 1;
}

.btn-primary {
    background: var(--primary);
    color: white;
}

.btn-primary:hover {
    background: #1565c0;
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(31, 115, 219, 0.3);
}

.btn-secondary {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
}

.btn-secondary:hover {
    background: var(--border);
}

.form-message {
    padding: 1rem;
    border-radius: 6px;
    display: none;
    margin-top: 1rem;
}

.form-message.success {
    background: #e8f5e9;
    color: #2e7d32;
    border-left: 4px solid #4caf50;
    display: block;
}

.form-message.error {
    background: #ffebee;
    color: #c62828;
    border-left: 4px solid #f44336;
    display: block;
}

image-preview {
    display: block;
    max-width: 200px;
    margin-top: 0.5rem;
}

image-preview img {
    max-width: 100%;
    border-radius: 6px;
    border: 1px solid var(--border);
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('add-product-form');
    const colorInput = document.getElementById('product-color');
    const swatchPreview = document.querySelector('.swatch-preview');
    const imageInput = document.getElementById('product-image');
    const imagePreviewContainer = document.getElementById('image-preview-container');
    const messageDiv = document.getElementById('form-message');

    // Update color swatch preview
    colorInput.addEventListener('change', function() {
        swatchPreview.style.backgroundColor = this.value;
    });

    // Update image preview
    imageInput.addEventListener('input', function() {
        if (this.value) {
            const img = new Image();
            img.onload = function() {
                imagePreviewContainer.innerHTML = `<img src="${imageInput.value}" alt="Preview">`;
            };
            img.onerror = function() {
                imagePreviewContainer.innerHTML = '';
            };
            img.src = this.value;
        } else {
            imagePreviewContainer.innerHTML = '';
        }
    });

    // Handle form submission
    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const formData = {
            id: document.getElementById('product-id').value,
            name: document.getElementById('product-name').value,
            price: parseFloat(document.getElementById('product-price').value),
            size: document.getElementById('product-size').value,
            color: document.getElementById('product-color').value,
            image: document.getElementById('product-image').value
        };

        try {
            messageDiv.className = 'form-message';
            messageDiv.textContent = (window.t ? window.t('form.creating_product') : 'Creando producto...');
            messageDiv.classList.add('success');
            messageDiv.style.display = 'block';

            const response = await fetch('/api/products', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(formData)
            });

            const data = await response.json();

            if (response.ok && data.success) {
                messageDiv.className = 'form-message success';
                messageDiv.textContent = (window.t ? window.t('form.product_created_redirect') : 'Producto creado exitosamente. Redirigiendo...');
                messageDiv.style.display = 'block';
                
                setTimeout(() => {
                    window.location.href = '/products';
                }, 1500);
            } else {
                messageDiv.className = 'form-message error';
                messageDiv.textContent = 'Error: ' + (data.error || 'No se pudo crear el producto');
                messageDiv.style.display = 'block';
            }
        } catch (error) {
            messageDiv.className = 'form-message error';
            messageDiv.textContent = 'Error de conexión: ' + error.message;
            messageDiv.style.display = 'block';
        }
    });
});
</script>
{% endblock %}
