<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FIWARE Almacén Inteligente{% endblock %}</title>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Mermaid.js for data model diagrams -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    
    <!-- Leaflet for maps -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    
    <!-- Three.js for 3D visualization -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- Socket.IO client -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    
    <!-- Custom styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Navigation bar -->
    <nav class="navbar">
        <div class="navbar-container">
            <!-- Logo -->
            <div class="navbar-brand">
                <a href="/" class="logo">
                    <i class="fas fa-warehouse"></i>
                    <span data-i18n="brand.title">FIWARE Almacén</span>
                </a>
            </div>
            
            <!-- Navigation links -->
            <ul class="nav-links">
                <li><a href="/" data-i18n="nav.home" data-nav-section="home">Inicio</a></li>
                <li><a href="/products" data-i18n="nav.products" data-nav-section="products">Productos</a></li>
                <li><a href="/stores" data-i18n="nav.stores" data-nav-section="stores">Almacenes</a></li>
                <li><a href="/employees" data-i18n="nav.employees" data-nav-section="employees">Empleados</a></li>
                <li><a href="/stores/map" data-i18n="nav.stores_map" data-nav-section="stores-map">Mapa Stores</a></li>
            </ul>
            
            <!-- Right side controls -->
            <div class="navbar-controls">
                <!-- Notification badge -->
                <button id="notification-toggle" class="notification-badge" data-i18n-aria-label="notifications.title" aria-label="Notificaciones" aria-controls="notifications-panel" aria-expanded="false" type="button">
                    <i class="fas fa-bell"></i>
                    <span class="badge-count" id="notification-count">0</span>
                </button>
                
                <!-- Language selector -->
                <select id="language-selector" class="language-selector">
                    <option value="es" data-i18n="lang.spanish">Español</option>
                    <option value="en" data-i18n="lang.english">English</option>
                </select>
                
                <!-- Dark/Light mode toggle -->
                <button id="theme-toggle" class="theme-toggle" data-i18n-title="theme.toggle" title="Toggle dark/light mode">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </div>
    </nav>
    
    <!-- Main content area -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>
    
    <!-- Notifications panel -->
    <div id="notifications-panel" class="notifications-panel" aria-hidden="true">
        <div class="notifications-header">
            <h3 data-i18n="notifications.title">Notificaciones</h3>
            <button id="clear-notifications" class="btn btn-secondary btn-small" type="button" data-i18n="notifications.clear_all">Borrar todas</button>
            <button id="close-notifications" class="close-btn" type="button">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div id="notifications-list" class="notifications-list">
            <!-- Populated dynamically by JavaScript -->
        </div>
    </div>
    
    <!-- Footer -->
    <footer class="footer">
        <p data-i18n="footer.text">Almacén Inteligente FIWARE &copy; 2024</p>
        <p class="status">
            <span id="orion-status" class="status-indicator">
                <i class="fas fa-circle"></i> <span data-i18n="footer.connecting">Conectando...</span>
            </span>
        </p>
    </footer>
    
    <script>
        window.appBootId = {{ app_boot_id|tojson }};
    </script>

    <!-- Main script -->
    <script src="{{ url_for('static', filename='main.js') }}"></script>
    
    {% block extra_js %}{% endblock %}
    
    <script>
        // Initialize Socket.IO connection
        window.appSocket = io();
        const socket = window.appSocket;
        
        socket.on('connect', () => {
            console.log('Connected to server');
            document.getElementById('orion-status').className = 'status-indicator connected';
            if (typeof window.t === 'function') {
                document.querySelector('#orion-status span').textContent = window.t('status.connected');
            } else {
                document.querySelector('#orion-status span').textContent = 'Conectado';
            }
        });
        
        socket.on('disconnect', () => {
            console.log('Disconnected from server');
            document.getElementById('orion-status').className = 'status-indicator disconnected';
        });
    </script>
</body>
</html>
