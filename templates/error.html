{% extends "base.html" %}

{% block title %}Error - FIWARE Almacén{% endblock %}

{% block content %}
<div class="container">
    <div class="error-page">
        <div class="error-icon">
            <i class="fas fa-exclamation-circle"></i>
        </div>
        <h1 data-i18n="error.title">Error</h1>
        <p class="error-message">{{ error }}</p>
        <a href="/" class="btn btn-primary" data-i18n="error.back_home">Volver al Inicio</a>
    </div>
</div>
{% endblock %}

{% block extra_css %}
<style>
.error-page {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 400px;
    text-align: center;
}

.error-icon {
    font-size: 5rem;
    color: var(--accent);
    margin-bottom: 1rem;
}

.error-page h1 {
    margin: 1rem 0;
    color: var(--text);
}

.error-message {
    color: var(--text-secondary);
    margin: 1rem 0 2rem;
    font-size: 1.1rem;
}
</style>
{% endblock %}
